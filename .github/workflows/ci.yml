name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: |
          set -e
          for f in package.json src/server.js README.md LICENSE render.yaml; do
            [ -f "$f" ] && echo "✅ $f" || { echo "❌ Missing: $f"; exit 1; }
          done
      - run: npm install
      - run: node --check src/server.js
      - name: Smoke test (import server module)
        run: |
          node -e "
          import('./src/server.js').then(() => {
            console.log('✅ server.js imports successfully');
            process.exit(0);
          }).catch((err) => {
            console.error('❌ server.js failed:', err.message);
            process.exit(1);
          });
          "
